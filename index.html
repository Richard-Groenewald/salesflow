<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focus · Xone Security</title>
<style>
/* ── Variables ─────────────────────────────────────────── */
:root {
  --red:      #D0021B;
  --navy:     #0D1B2A;
  --navy2:    #162437;
  --navy3:    #1E3050;
  --white:    #FFFFFF;
  --bg:       #F4F6F9;
  --bg2:      #FFFFFF;
  --border:   #DDE3EC;
  --text:     #0D1B2A;
  --text2:    #4A5568;
  --text3:    #8A98A8;
  --green:    #1A8A5A;
  --radius:   8px;
  --radius-lg:12px;
  --shadow:   0 2px 8px rgba(0,0,0,0.08);
  --shadow-lg:0 8px 32px rgba(0,0,0,0.14);
  --sidebar-w:240px;
}

/* ── Reset ─────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;background:var(--bg);color:var(--text);}
button{cursor:pointer;font-family:inherit;font-size:inherit;}
input,textarea,select{font-family:inherit;font-size:inherit;}
a{color:inherit;text-decoration:none;}

/* ── Layout ────────────────────────────────────────────── */
.app{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:var(--sidebar-w);background:var(--navy);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.content{flex:1;overflow-y:auto;padding:28px 32px;}

/* ── Sidebar ───────────────────────────────────────────── */
.sidebar-logo{padding:20px 18px 16px;border-bottom:1px solid var(--navy3);}
.sidebar-logo img{height:48px;width:auto;}
.sidebar-logo-text{color:var(--white);font-size:11px;letter-spacing:0.08em;opacity:0.5;margin-top:6px;}
.nav-section{padding:16px 18px 6px;font-size:10px;font-weight:700;letter-spacing:0.1em;color:rgba(255,255,255,0.35);text-transform:uppercase;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 18px;color:rgba(255,255,255,0.65);border:none;background:none;width:100%;text-align:left;font-size:13px;font-weight:500;transition:all 0.15s;border-left:3px solid transparent;}
.nav-item:hover{background:rgba(255,255,255,0.06);color:var(--white);}
.nav-item.active{background:rgba(208,2,27,0.15);color:var(--white);border-left-color:var(--red);}
.nav-icon{width:16px;height:16px;flex-shrink:0;opacity:0.7;}
.nav-item.active .nav-icon,.nav-item:hover .nav-icon{opacity:1;}
.sidebar-footer{margin-top:auto;padding:14px 18px;border-top:1px solid var(--navy3);font-size:11px;color:rgba(255,255,255,0.35);}

/* ── Top Bar ───────────────────────────────────────────── */
.topbar{height:56px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 32px;gap:16px;flex-shrink:0;}
.topbar-title{font-size:18px;font-weight:700;color:var(--text);}
.topbar-sub{font-size:13px;color:var(--text3);margin-left:2px;}
.topbar-actions{margin-left:auto;display:flex;gap:8px;}

/* ── Cards ─────────────────────────────────────────────── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow);}
.card-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-size:14px;font-weight:700;color:var(--text);}
.card-body{padding:20px;}

/* ── Buttons ───────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius);border:none;font-weight:600;font-size:13px;transition:all 0.15s;white-space:nowrap;}
.btn-primary{background:var(--red);color:var(--white);}
.btn-primary:hover{background:#b50218;}
.btn-secondary{background:var(--bg);color:var(--text);border:1px solid var(--border);}
.btn-secondary:hover{background:var(--border);}
.btn-danger{background:#FEF2F2;color:var(--red);border:1px solid #FECACA;}
.btn-danger:hover{background:#FECACA;}
.btn-sm{padding:5px 11px;font-size:12px;}
.btn-ghost{background:none;color:var(--text2);border:1px solid var(--border);}
.btn-ghost:hover{background:var(--bg);}

/* ── Table ─────────────────────────────────────────────── */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{background:var(--bg);font-size:11px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;color:var(--text3);padding:10px 14px;text-align:left;border-bottom:1px solid var(--border);}
td{padding:12px 14px;border-bottom:1px solid var(--border);color:var(--text);font-size:13px;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#F8FAFC;}
.empty-row td{text-align:center;padding:40px;color:var(--text3);}

/* ── Badges ────────────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:600;}
.badge-green{background:#ECFDF5;color:var(--green);}
.badge-red{background:#FEF2F2;color:var(--red);}
.badge-gray{background:var(--bg);color:var(--text3);}
.badge-blue{background:#EFF6FF;color:#1D4ED8;}

/* ── Forms ─────────────────────────────────────────────── */
.form-group{margin-bottom:16px;}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;letter-spacing:0.02em;}
.form-control{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg2);color:var(--text);transition:border-color 0.15s;}
.form-control:focus{outline:none;border-color:var(--red);box-shadow:0 0 0 3px rgba(208,2,27,0.08);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}

/* ── Modal ─────────────────────────────────────────────── */
#modal-root{position:fixed;inset:0;z-index:9999;pointer-events:none;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;pointer-events:all;}
.modal{background:var(--bg2);border-radius:var(--radius-lg);width:560px;max-width:96vw;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);display:flex;flex-direction:column;}
.modal-header{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg2);z-index:1;}
.modal-title{font-size:16px;font-weight:700;}
.modal-close{background:none;border:none;color:var(--text3);font-size:22px;line-height:1;padding:2px 6px;border-radius:4px;}
.modal-close:hover{background:var(--bg);color:var(--text);}
.modal-body{padding:22px;flex:1;}
.modal-footer{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:var(--bg2);}

/* ── Status ────────────────────────────────────────────── */
.status-bar{position:fixed;bottom:20px;right:20px;padding:10px 16px;border-radius:var(--radius);font-size:13px;font-weight:600;display:none;z-index:99999;animation:slideIn 0.2s ease;}
.status-bar.success{background:#ECFDF5;color:var(--green);border:1px solid #A7F3D0;display:block;}
.status-bar.error{background:#FEF2F2;color:var(--red);border:1px solid #FECACA;display:block;}
@keyframes slideIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* ── Connection ────────────────────────────────────────── */
.conn-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:4px 10px;border-radius:999px;}
.conn-badge.online{background:#ECFDF5;color:var(--green);}
.conn-badge.offline{background:#FEF2F2;color:var(--red);}
.conn-dot{width:6px;height:6px;border-radius:50%;background:currentColor;}

/* ── Utility ───────────────────────────────────────────── */
.flex{display:flex;}.gap-8{gap:8px;}.items-center{align-items:center;}.justify-between{justify-content:space-between;}
.mt-16{margin-top:16px;}.mb-16{margin-bottom:16px;}
.text-sm{font-size:12px;}.text-muted{color:var(--text3);}
.divider{height:1px;background:var(--border);margin:16px 0;}

/* ── Opportunity Form ──────────────────────────────────── */
.opp-page { display:none; position:fixed; inset:0; background:var(--bg); z-index:1000; overflow-y:auto; flex-direction:column; }
.opp-page.active { display:flex; }
.opp-topbar { background:var(--bg2); border-bottom:1px solid var(--border); padding:0 28px; display:flex; align-items:center; gap:16px; height:52px; flex-shrink:0; position:sticky; top:0; z-index:10; }
.opp-topbar-title { font-size:16px; font-weight:700; flex:1; }
.opp-body { padding:24px 28px; flex:1; }
.opp-tabs { display:flex; gap:2px; border-bottom:2px solid var(--border); margin-bottom:20px; }
.opp-tab { padding:9px 18px; font-size:13px; font-weight:600; color:var(--text3); border:none; background:none; cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-2px; transition:all 0.15s; }
.opp-tab.active { color:var(--red); border-bottom-color:var(--red); }
.opp-tab.active:hover { color:var(--red); }
.opp-tab:hover { color:var(--text); }
.opp-tab-content { display:none; }
.opp-tab-content.active { display:block; }
.opp-section { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius-lg); padding:20px; margin-bottom:16px; }
.opp-section-title { font-size:12px; font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:16px; }
.opp-grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.opp-grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; }
.opp-grid-4 { display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:16px; }

/* Revenue Grid */
.rev-grid-wrap { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius-lg); margin-top:20px; overflow:hidden; }
.rev-grid-header { padding:14px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.rev-grid-title { font-size:13px; font-weight:700; }
.rev-fy-tabs { display:flex; gap:2px; padding:0 20px; border-bottom:1px solid var(--border); background:var(--bg); }
.rev-fy-tab { padding:8px 14px; font-size:12px; font-weight:600; color:var(--text3); border:none; background:none; cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; }
.rev-fy-tab.active { color:var(--red); border-bottom-color:var(--red); background:var(--bg2); }
.rev-fy-content { display:none; padding:16px 20px; overflow-x:auto; }
.rev-fy-content.active { display:block; }
.rev-table { width:100%; border-collapse:collapse; font-size:12px; min-width:700px; }
.rev-table th { background:var(--bg); padding:7px 10px; text-align:center; font-size:11px; font-weight:700; color:var(--text3); border:1px solid var(--border); white-space:nowrap; }
.rev-table th.row-label { text-align:left; width:80px; }
.rev-table td { padding:4px 6px; border:1px solid var(--border); text-align:right; }
.rev-table td.row-label { text-align:left; font-weight:600; font-size:11px; color:var(--text2); background:var(--bg); padding:4px 10px; }
.rev-table td.total-col { background:#F8FAFC; font-weight:700; }
.rev-input { width:100%; border:none; background:transparent; text-align:right; font-size:12px; padding:4px 2px; outline:none; color:var(--text); }
.rev-input:focus { background:rgba(208,2,27,0.05); border-radius:3px; }
.rev-calc { color:var(--text2); font-size:12px; padding:4px 8px; }
.rev-totals { display:flex; gap:24px; padding:14px 20px; border-top:1px solid var(--border); background:var(--bg); }
.rev-total-item { display:flex; flex-direction:column; gap:2px; }
.rev-total-label { font-size:11px; color:var(--text3); font-weight:600; text-transform:uppercase; letter-spacing:0.05em; }
.rev-total-value { font-size:18px; font-weight:800; color:var(--text); }
.rev-total-value.highlight { color:var(--red); }

/* Engagement log */
.eng-entry { background:var(--bg); border:1px solid var(--border); border-radius:var(--radius); padding:14px; margin-bottom:10px; }
.eng-entry-header { display:flex; align-items:center; gap:12px; margin-bottom:8px; font-size:12px; color:var(--text3); }
.eng-entry-date { font-weight:700; color:var(--text); }
.eng-badge { background:var(--navy); color:white; font-size:10px; font-weight:700; padding:2px 8px; border-radius:999px; }
</style>
</head>

<!-- Opportunity Form Page -->
<div class="opp-page" id="opp-page">
  <div class="opp-topbar">
    <button class="btn btn-ghost btn-sm" onclick="closeOppPage()">← Back</button>
    <div class="opp-topbar-title" id="opp-page-title">New Opportunity</div>
    <div style="display:flex;gap:8px;align-items:center;">
      <div id="opp-status-badge" style="font-size:12px;color:var(--text3);"></div>
      <button class="btn btn-secondary btn-sm" onclick="closeOppPage()">Cancel</button>
      <button class="btn btn-primary" onclick="saveOpportunity()">Save</button>
    </div>
  </div>

  <div class="opp-body">
    <!-- Top Tabs -->
    <div class="opp-tabs">
      <button class="opp-tab active" onclick="switchOppTab('general', this)">General</button>
      <button class="opp-tab" onclick="switchOppTab('commercial', this)">Commercial</button>
      <button class="opp-tab" onclick="switchOppTab('collaborators', this)">Collaborators</button>
      <button class="opp-tab" onclick="switchOppTab('engagement', this)">Engagement</button>
      <button class="opp-tab" id="lost-tab" onclick="switchOppTab('lost', this)" style="display:none;">Lost</button>
    </div>

    <!-- General Tab -->
    <div class="opp-tab-content active" id="opp-tab-general">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;">

        <!-- Left column -->
        <div>
          <div class="form-group">
            <label class="form-label">Client <span style="color:var(--red)">*</span></label>
            <div style="display:flex;gap:8px;">
              <select id="opp-org-id" class="form-control" onchange="onOppOrgChange()" style="flex:1;max-width:340px;">
                <option value="">— select client —</option>
              </select>
              <button class="btn btn-primary btn-sm" onclick="alert('Create client coming soon')" style="white-space:nowrap;background:var(--navy);">Create</button>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Deal Name <span style="color:var(--red)">*</span></label>
            <input type="text" id="opp-name" class="form-control" placeholder="">
          </div>

          <div style="display:flex;gap:12px;align-items:flex-end;">
            <div class="form-group" style="flex:0 0 180px;margin-bottom:0;">
              <label class="form-label">Product/Service Type</label>
              <select id="opp-service-sub-id" class="form-control" onchange="onOppServiceChange()">
                <option value="">— select —</option>
              </select>
              <input type="hidden" id="opp-service-major-id">
            </div>
            <div class="form-group" style="flex:0 0 130px;margin-bottom:0;">
              <label class="form-label">Region</label>
              <select id="opp-region-id" class="form-control">
                <option value="">— select —</option>
              </select>
            </div>
            <div class="form-group" style="flex:0 0 160px;margin-bottom:0;">
              <label class="form-label">Stage <span style="color:var(--red)">*</span></label>
              <select id="opp-stage-id" class="form-control" onchange="onOppStageChange()">
                <option value="">— select —</option>
              </select>
            </div>
          </div>

          <div class="form-group" style="margin-top:16px;">
            <label class="form-label">Description</label>
            <textarea id="opp-notes" class="form-control" style="height:160px;resize:none;"></textarea>
          </div>
        </div>

        <!-- Right column -->
        <div class="form-group" style="margin-bottom:0;">
          <label class="form-label">Notes</label>
          <textarea id="opp-ext-notes" class="form-control" style="height:calc(100% - 28px);min-height:280px;resize:none;"></textarea>
        </div>

      </div>
    </div>

    <!-- Commercial Tab -->
    <div class="opp-tab-content" id="opp-tab-commercial">
      <div class="opp-section">
        <div class="opp-grid-4">
          <div class="form-group">
            <label class="form-label">Margin %</label>
            <input type="number" id="opp-margin-pct" class="form-control" step="0.1" min="0" max="100" value="25" oninput="recalcGrid()">
          </div>
          <div class="form-group">
            <label class="form-label">Probability %</label>
            <input type="number" id="opp-probability" class="form-control" step="1" min="0" max="100" value="50">
          </div>
          <div class="form-group">
            <label class="form-label">Order Date</label>
            <input type="date" id="opp-order-date" class="form-control">
          </div>
          <div class="form-group">
            <label class="form-label">Start Date</label>
            <input type="date" id="opp-start-date" class="form-control">
          </div>
        </div>
        <div style="background:var(--bg);border-radius:var(--radius);padding:14px;margin-top:4px;">
          <div class="opp-section-title">Auto-Populate Revenue Grid</div>
          <div class="opp-grid-4">
            <div class="form-group" style="margin-bottom:0">
              <label class="form-label">Base Amount (R/month)</label>
              <input type="number" id="opp-base-amount" class="form-control" placeholder="0">
            </div>
            <div class="form-group" style="margin-bottom:0">
              <label class="form-label">Number of Months</label>
              <input type="number" id="opp-num-months" class="form-control" placeholder="12" min="1" max="60">
            </div>
            <div class="form-group" style="margin-bottom:0">
              <label class="form-label">Annual Escalation %</label>
              <input type="number" id="opp-escalation" class="form-control" placeholder="0" step="0.1">
            </div>
            <div class="form-group" style="margin-bottom:0;display:flex;align-items:flex-end;">
              <button class="btn btn-secondary" style="width:100%;" onclick="autoPopulateGrid()">Auto-Populate</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Collaborators Tab -->
    <div class="opp-tab-content" id="opp-tab-collaborators">
      <div class="opp-section">
        <div class="opp-section-title">Owner</div>
        <div class="opp-grid-2">
          <div class="form-group">
            <label class="form-label">Owner <span style="color:var(--red)">*</span></label>
            <select id="opp-owner-id" class="form-control">
              <option value="">— select owner —</option>
            </select>
          </div>
        </div>
      </div>
      <div class="opp-section">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
          <div class="opp-section-title" style="margin-bottom:0;">Collaborators</div>
          <button class="btn btn-secondary btn-sm" onclick="addCollaboratorRow()">+ Add</button>
        </div>
        <div id="collaborators-list"></div>
      </div>
    </div>

    <!-- Engagement Tab -->
    <div class="opp-tab-content" id="opp-tab-engagement">
      <div style="display:flex;justify-content:flex-end;margin-bottom:12px;">
        <button class="btn btn-primary btn-sm" onclick="openEngagementModal()">+ Log Engagement</button>
      </div>
      <div id="engagement-list">
        <div style="text-align:center;padding:40px;color:var(--text3);">No engagements logged yet</div>
      </div>
    </div>

    <!-- Lost Tab -->
    <div class="opp-tab-content" id="opp-tab-lost">
      <div class="opp-section">
        <div class="opp-grid-2">
          <div class="form-group">
            <label class="form-label">Lost Date</label>
            <input type="date" id="opp-lost-date" class="form-control">
          </div>
          <div class="form-group">
            <label class="form-label">Lost To (Competitor)</label>
            <input type="text" id="opp-lost-to" class="form-control" placeholder="Competitor name">
          </div>
        </div>
        <div class="opp-grid-2">
          <div class="form-group">
            <label class="form-label">Lost Reason</label>
            <select id="opp-lost-reason" class="form-control">
              <option value="">— select reason —</option>
              <option>Price</option>
              <option>Relationship</option>
              <option>Scope</option>
              <option>No Decision</option>
              <option>Other</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Notes</label>
            <textarea id="opp-lost-notes" class="form-control" rows="3"></textarea>
          </div>
        </div>
      </div>

// ── API ──────────────────────────────────────────────────
async function api(table, method='GET', body=null, params='') {
  const url = `${FN_URL}/${table}${params ? '?' + params : ''}`;
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json', 'Prefer': method === 'POST' ? 'return=representation' : method === 'PATCH' ? 'return=representation' : '' }
  };
  if (body) opts.body = JSON.stringify(body);
  try {
    const res = await fetch(url, opts);
    if (!res.ok) {
      const err = await res.text();
      throw new Error(`${res.status}: ${err}`);
    }
    const text = await res.text();
    return text ? JSON.parse(text) : [];
  } catch(e) {
    console.error(`API ${method} ${table}:`, e.message);
    throw e;
  }
}

async function apiGet(table, params='') { return api(table, 'GET', null, params); }
async function apiPost(table, body) { return api(table, 'POST', body, 'select=*'); }
async function apiPatch(table, id, body) { return api(table, 'PATCH', body, `id=eq.${id}&select=*`); }
async function apiDelete(table, id) { return api(table, 'DELETE', null, `id=eq.${id}`); }

// ── Navigation ───────────────────────────────────────────
function showPage(page) {
  currentPage = page;
  const cfg = PAGES[page];
  if (!cfg) return;

  // Update nav highlight
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const activeNav = document.getElementById('nav-' + page);
  if (activeNav) activeNav.classList.add('active');

  // Update topbar
  document.getElementById('page-title').textContent = cfg.title;
  document.getElementById('page-sub').textContent = '';

  // Show/hide and wire add button
  const addBtn = document.getElementById('add-btn');
  addBtn.style.display = (cfg.readOnly) ? 'none' : '';
  if (page === 'opportunities') {
    addBtn.onclick = () => openNewOpportunity();
    addBtn.textContent = '+ New Opportunity';
  } else if (page === 'role_permissions') {
    addBtn.style.display = 'none';
  } else {
    addBtn.onclick = () => openAddModal();
    addBtn.textContent = '+ Add';
  }

  // Load data
  loadTable(page);
}

// ── Table Rendering ──────────────────────────────────────
async function loadTable(page) {
  const cfg = PAGES[page];

  // Custom pages
  if (cfg.custom) {
    if (page === 'role_permissions') { await renderRolePermissions(); return; }
    if (page === 'opportunities') { await renderOpportunitiesPage(); return; }
    if (page === 'settings') { await renderSettingsPage(); return; }
  }

  const body = document.getElementById('table-body');
  const head = document.getElementById('table-head');

  // Render header
  const cols = [...cfg.columns, { key: '_actions', label: 'Actions' }];
  head.innerHTML = '<tr>' + cols.map(c => `<th>${c.label}</th>`).join('') + '</tr>';
  body.innerHTML = '<tr class="empty-row"><td colspan="' + cols.length + '">Loading...</td></tr>';

  try {
    // Preload any lookup tables needed
    for (const col of cfg.columns) {
      if (col.lookup && !allData[col.lookup]) {
        allData[col.lookup] = await apiGet(col.lookup, 'select=*');
      }
    }
    // Parties page needs both people and organisations for ref_id rendering
    if (page === 'parties') {
      if (!allData['people']) allData['people'] = await apiGet('people', 'select=*');
      if (!allData['organisations']) allData['organisations'] = await apiGet('organisations', 'select=*');
    }
    for (const field of (cfg.fields || [])) {
      if (field.lookupTable === 'eligible_people') {
        // Load only people eligible to be system users
        allData['eligible_people'] = await loadEligiblePeople();
      } else if (field.lookupTable && !allData[field.lookupTable]) {
        allData[field.lookupTable] = await apiGet(field.lookupTable, 'select=*');
      }
    }

    currentData = await apiGet(cfg.table, 'select=*&order=id.asc');
    allData[cfg.table] = currentData;
    // Cache roles and permissions for role_permissions matrix
    if (cfg.table === 'roles' || cfg.table === 'permissions') allData[cfg.table] = currentData;

    document.getElementById('page-sub').textContent = currentData.length + ' record' + (currentData.length !== 1 ? 's' : '');

    if (!currentData.length) {
      body.innerHTML = '<tr class="empty-row"><td colspan="' + cols.length + '">No records yet — click "+ Add" to create one</td></tr>';
      return;
    }

    body.innerHTML = currentData.map(row => {
      const cells = cfg.columns.map(col => {
        let val = row[col.key];
        if (col.render) return `<td>${col.render(val)}</td>`;
        if (col.lookup) {
          const lookup = allData[col.lookup] || [];
          const found = lookup.find(r => +r.id === +val);
          val = found ? col.lookupLabel(found) : (val || '—');
        }
        return `<td>${val ?? '—'}</td>`;
      }).join('');
      const actions = cfg.readOnly ? '<td><span class="text-muted text-sm">Read only</span></td>' : `<td>
        <button class="btn btn-ghost btn-sm" onclick="openEditModal(${row.id})">Edit</button>
        <button class="btn btn-danger btn-sm" onclick="confirmDelete(${row.id})">Delete</button>
      </td>`;
      return `<tr>${cells}${actions}</tr>`;
    }).join('');

  } catch(e) {
    body.innerHTML = `<tr class="empty-row"><td colspan="${cols.length}">Error loading data: ${e.message}</td></tr>`;
    showStatus('Failed to load data', 'error');
  }
}

  editingId = null;
  renderModal(null);
}

function openEditModal(id) {
  editingId = id;
  const row = currentData.find(r => +r.id === +id);
  if (!row) { showStatus('Record not found', 'error'); return; }
  renderModal(row);
}

async function renderModal(data) {
  const cfg = PAGES[currentPage];
  const isEdit = !!data;
  const title = isEdit ? `Edit ${cfg.title.slice(0,-1)}` : `Add ${cfg.title.slice(0,-1)}`;

  const fields = cfg.fields.map(f => {
    const val = data ? (data[f.key] ?? '') : (f.type === 'checkbox' ? false : '');
    return renderField(f, val);
  }).join('');

  const html = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">${title}</div>
          <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div class="modal-body">
          <form id="modal-form" onsubmit="saveRecord(event)">
            ${fields}
          </form>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" onclick="saveRecord()">Save</button>
        </div>
      </div>
    </div>`;

  document.getElementById('modal-root').innerHTML = html;

  // For parties, populate ref_id based on party_type
  if (currentPage === 'parties') {
    const partyTypeEl = document.getElementById('f_party_type');
    if (partyTypeEl && partyTypeEl.value) {
      await onPartyTypeChange(partyTypeEl.value);
      // If editing, set the selected value
      if (data && data.ref_id) {
        const refEl = document.getElementById('f_ref_id');
        if (refEl) refEl.value = data.ref_id;
      }
    }
  }

  // Focus first input
  setTimeout(() => {
    const first = document.querySelector('#modal-form input, #modal-form select, #modal-form textarea');
    if (first) first.focus();
  }, 50);
}

function renderField(f, val) {
  const adminNote = f.adminOnly ? ' <span style="color:var(--text3);font-weight:400;">(admin only)</span>' : '';
  const label = `<label class="form-label">${f.label}${f.required ? ' <span style="color:var(--red)">*</span>' : ''}${adminNote}</label>`;

  if (f.type === 'checkbox') {
    return `<div class="form-group" style="display:flex;align-items:center;gap:8px;">
      <input type="checkbox" id="f_${f.key}" name="${f.key}" ${val ? 'checked' : ''} style="width:16px;height:16px;accent-color:var(--red);">
      <label for="f_${f.key}" class="form-label" style="margin:0;">${f.label}</label>
    </div>`;
  }

  if (f.type === 'textarea') {
    return `<div class="form-group">${label}<textarea id="f_${f.key}" name="${f.key}" class="form-control" rows="3" ${f.required?'required':''}>${val}</textarea></div>`;
  }

  if (f.type === 'select') {
    const onchange = (currentPage === 'parties' && f.key === 'party_type') ? ' onchange="onPartyTypeChange(this.value)"' : '';
    const opts = f.options.map(o => `<option value="${o}" ${val==o?'selected':''}>${o||'— select —'}</option>`).join('');
    return `<div class="form-group">${label}<select id="f_${f.key}" name="${f.key}" class="form-control" ${f.required?'required':''}${onchange}>${opts}</select></div>`;
  }

  if (f.type === 'lookup') {
    const lookupData = allData[f.lookupTable] || [];
    const opts = lookupData.map(r => `<option value="${r.id}" ${+val===+r.id?'selected':''}>${f.lookupLabel(r)}</option>`).join('');
    return `<div class="form-group">${label}<select id="f_${f.key}" name="${f.key}" class="form-control" ${f.required?'required':''}><option value="">— select —</option>${opts}</select></div>`;
  }

  if (f.type === 'dynamic_lookup') {
    // Will be populated by onPartyTypeChange
    return `<div class="form-group">${label}<select id="f_${f.key}" name="${f.key}" class="form-control" ${f.required?'required':''}><option value="">— select party type first —</option></select></div>`;
  }

  return `<div class="form-group">${label}<input type="${f.type||'text'}" id="f_${f.key}" name="${f.key}" class="form-control" value="${val}" ${f.required?'required':''} ${f.placeholder?`placeholder="${f.placeholder}"`:''} autocomplete="off"></div>`;
}

function closeModal() {
  document.getElementById('modal-root').innerHTML = '';
}

async function saveRecord(e) {
  if (e) e.preventDefault();
  const cfg = PAGES[currentPage];
  const body = {};

  for (const f of cfg.fields) {
    const el = document.getElementById('f_' + f.key);
    if (!el) continue;
    if (f.type === 'checkbox') body[f.key] = el.checked;
    else if (f.type === 'number' || f.type === 'lookup') body[f.key] = el.value ? +el.value : null;
    else body[f.key] = el.value || null;

    if (f.required && !body[f.key] && body[f.key] !== false) {
      showStatus(`${f.label} is required`, 'error');
      el.focus();
      return;
    }
  }

  // Extra validation for system_users
  if (currentPage === 'system_users' && !editingId) {
    const personId = body.person_id;
    if (!personId) { showStatus('Please select a person', 'error'); return; }
    try {
      // Check person has an org affiliation
      const affiliations = await apiGet('person_organisation_roles', 'person_id=eq.' + personId + '&select=org_id');
      if (!affiliations || !affiliations.length) {
        showStatus('Person must be affiliated with an organisation first', 'error');
        return;
      }
      // Check at least one org allows system users
      const orgIds = affiliations.map(a => a.org_id).join(',');
      const eligibleOrgs = await apiGet('organisations', 'id=in.(' + orgIds + ')&allows_system_users=eq.true&select=id');
      if (!eligibleOrgs || !eligibleOrgs.length) {
        showStatus('None of this person\'s organisations are eligible for system users', 'error');
        return;
      }
    } catch(validErr) {
      showStatus('Could not validate organisation eligibility: ' + validErr.message, 'error');
      return;
    }
  }

  try {
    if (editingId) {
      await apiPatch(cfg.table, editingId, body);
      showStatus('Record updated');
    } else {
      await apiPost(cfg.table, body);
      showStatus('Record created');
    }
    closeModal();
    allData[cfg.table] = null; // clear cache
    await loadTable(currentPage);
  } catch(e) {
    showStatus('Save failed: ' + e.message, 'error');
  }
}

async function confirmDelete(id) {
  const row = currentData.find(r => +r.id === +id);
  const cfg = PAGES[currentPage];
  const label = cfg.columns[0] ? (row[cfg.columns[0].key] || `Record #${id}`) : `Record #${id}`;

  const html = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal" style="width:420px;">
        <div class="modal-header">
          <div class="modal-title">Confirm Delete</div>
          <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div class="modal-body">
          <p>Are you sure you want to delete <strong>${label}</strong>?</p>
          <p class="text-sm text-muted" style="margin-top:8px;">This cannot be undone.</p>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
          <button class="btn btn-danger" onclick="deleteRecord(${id})">Delete</button>
        </div>
      </div>
    </div>`;

  document.getElementById('modal-root').innerHTML = html;
}

async function deleteRecord(id) {
  const cfg = PAGES[currentPage];
  try {
    await apiDelete(cfg.table, id);
    showStatus('Record deleted');
    closeModal();
    allData[cfg.table] = null;
    await loadTable(currentPage);
  } catch(e) {
    showStatus('Delete failed: ' + e.message, 'error');
  }
}

let oppData = {}; // current opportunity being edited

function getFYMonths(fy) {
  const startMonthName = appSettings['fy_start_month'] || 'April';
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const startM = MONTHS.indexOf(startMonthName); // 0-based
  const months = [];
  for (let i = 0; i < 12; i++) {
    const totalM = startM + i;
    const year = fy + Math.floor(totalM / 12);
    const month = (totalM % 12) + 1; // 1-based for formatting
    months.push(year + '-' + String(month).padStart(2, '0'));
  }
  return months;
}

function getCurrentFY() {
  const now = new Date();
  return now.getMonth() >= 3 ? now.getFullYear() : now.getFullYear() - 1;
}

function getFYLabel(fy) {
  return `FY${fy}/${String(fy+1).slice(2)}`;
}

    allData['people'] || apiGet('people', 'select=*&order=first_name.asc'),
  ]);

  allData['regions'] = regions;
  allData['stages'] = stages;

  // Populate stage dropdown - only opportunity stages
  const oppCats = stageCats.filter(c => c.name.startsWith('Opportunity'));

  const stageSel = document.getElementById('opp-stage-id');
  stageSel.innerHTML = '<option value="">— select stage —</option>';
  oppCats.forEach(cat => {
    const catStages = oppStages.filter(s => +s.category_id === +cat.id);

      stageSel.innerHTML += `<optgroup label="${cat.name}">` +

    if (sub) document.getElementById('opp-service-major-id').value = sub.major_id;

  // Populate owner - prefer Xone people but fall back to all people
  const xonePeople = people.filter(p => p.is_xone);
  const ownerPool = xonePeople.length ? xonePeople : people;
  const ownerSel = document.getElementById('opp-owner-id');
  ownerSel.innerHTML = '<option value="">— select owner —</option>' +
    ownerPool.map(p => {

      return `<option value="${p.id}" ${oppData.owner_id==p.id?'selected':''}>${name}</option>`;
    }).join('');

  // Populate form fields
  if (oppData.name) document.getElementById('opp-name').value = oppData.name;
  if (oppData.margin_pct) document.getElementById('opp-margin-pct').value = oppData.margin_pct;
  if (oppData.probability) document.getElementById('opp-probability').value = oppData.probability;
  if (oppData.order_date) document.getElementById('opp-order-date').value = oppData.order_date;
  if (oppData.start_date) document.getElementById('opp-start-date').value = oppData.start_date;

// ── Revenue Grid ─────────────────────────────────────────
function buildRevGrid() {
  const currentFY = getCurrentFY();
  oppFYs = [currentFY - 1, currentFY, currentFY + 1, currentFY + 2];

  const tabsEl = document.getElementById('rev-fy-tabs');
  const contentsEl = document.getElementById('rev-fy-contents');

  tabsEl.innerHTML = oppFYs.map((fy, i) =>
    `<button class="rev-fy-tab ${i===1?'active':''}" onclick="switchFYTab(${fy}, this)">${getFYLabel(fy)}</button>`
  ).join('');

  contentsEl.innerHTML = oppFYs.map((fy, i) => {
    const months = getFYMonths(fy);
    const monthHeaders = months.map(m => {
      const d = new Date(m + '-01');
      return `<th>${d.toLocaleDateString('en-ZA',{month:'short'})}</th>`;
    }).join('');

    const revenueInputs = months.map(m =>
      `<td><input class="rev-input" type="number" id="rev-r-${m}" value="${oppMonths[m]?.revenue||''}" placeholder="0" oninput="onRevInput('${m}')" min="0"></td>`
    ).join('');

    const marginCalcs = months.map(m =>
      `<td class="rev-calc" id="rev-m-${m}">${formatRev(calcMargin(m))}</td>`
    ).join('');

    const yearRevTotal = months.reduce((s,m) => s + (+oppMonths[m]?.revenue||0), 0);
    const yearMarginTotal = months.reduce((s,m) => s + calcMargin(m), 0);

    return `<div class="rev-fy-content ${i===1?'active':''}" id="rev-fy-${fy}">
      <table class="rev-table">
        <thead><tr>
          <th class="row-label">Month</th>
          ${monthHeaders}
          <th>Total</th>
        </tr></thead>
        <tbody>
          <tr>
            <td class="row-label">Revenue (R)</td>
            ${revenueInputs}
            <td class="total-col" id="rev-yr-rev-${fy}">${formatRev(yearRevTotal)}</td>
          </tr>
          <tr>
            <td class="row-label">Margin (R)</td>
            ${marginCalcs}
            <td class="total-col" id="rev-yr-mar-${fy}">${formatRev(yearMarginTotal)}</td>
          </tr>
        </tbody>
      </table>
    </div>`;
  }).join('');

  updateRevTotals();
}

function switchFYTab(fy, btn) {
  document.querySelectorAll('.rev-fy-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.rev-fy-content').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  const el = document.getElementById('rev-fy-' + fy);
  if (el) el.classList.add('active');
}

function calcMargin(month) {
  const rev = +oppMonths[month]?.revenue || 0;
  const pct = +(document.getElementById('opp-margin-pct')?.value || 25);
  return rev * pct / 100;
}

function onRevInput(month) {
  const val = +document.getElementById('rev-r-' + month)?.value || 0;
  if (!oppMonths[month]) oppMonths[month] = {};
  oppMonths[month].revenue = val;
  // Update margin cell
  const marginEl = document.getElementById('rev-m-' + month);
  if (marginEl) marginEl.textContent = formatRev(calcMargin(month));
  updateRevTotals();
}

function recalcGrid() {
  // Recalc all margin cells when margin % changes
  Object.keys(oppMonths).forEach(month => {
    const marginEl = document.getElementById('rev-m-' + month);
    if (marginEl) marginEl.textContent = formatRev(calcMargin(month));
  });
  // Update year totals
  oppFYs.forEach(fy => {
    const months = getFYMonths(fy);
    const yearRev = months.reduce((s,m) => s + (+oppMonths[m]?.revenue||0), 0);
    const yearMar = months.reduce((s,m) => s + calcMargin(m), 0);
    const revEl = document.getElementById('rev-yr-rev-' + fy);
    const marEl = document.getElementById('rev-yr-mar-' + fy);
    if (revEl) revEl.textContent = formatRev(yearRev);
    if (marEl) marEl.textContent = formatRev(yearMar);
  });
  updateRevTotals();
}

function updateRevTotals() {
  const allMonths = oppFYs.flatMap(fy => getFYMonths(fy));
  const tcv = allMonths.reduce((s,m) => s + (+oppMonths[m]?.revenue||0), 0);
  const totalMargin = allMonths.reduce((s,m) => s + calcMargin(m), 0);
  const prob = +(document.getElementById('opp-probability')?.value || 50);
  const weighted = tcv * prob / 100;

  // Update year row totals
  oppFYs.forEach(fy => {
    const months = getFYMonths(fy);
    const yearRev = months.reduce((s,m) => s + (+oppMonths[m]?.revenue||0), 0);
    const yearMar = months.reduce((s,m) => s + calcMargin(m), 0);
    const revEl = document.getElementById('rev-yr-rev-' + fy);
    const marEl = document.getElementById('rev-yr-mar-' + fy);
    if (revEl) revEl.textContent = formatRev(yearRev);
    if (marEl) marEl.textContent = formatRev(yearMar);
  });

  document.getElementById('rev-tcv').textContent = 'R ' + formatRev(tcv);
  document.getElementById('rev-total-margin').textContent = 'R ' + formatRev(totalMargin);
  document.getElementById('rev-weighted').textContent = 'R ' + formatRev(weighted);
}

function autoPopulateGrid() {
  const base = +document.getElementById('opp-base-amount').value || 0;
  const months = +document.getElementById('opp-num-months').value || 12;
  const esc = +document.getElementById('opp-escalation').value || 0;
  const startDate = document.getElementById('opp-start-date').value;

  if (!base) { showStatus('Enter a base amount first', 'error'); return; }
  if (!startDate) { showStatus('Enter a start date first', 'error'); return; }

  const startParts = startDate.split('-');
  const startYear = +startParts[0];
  const startMonth = +startParts[1]; // 1-based
  for (let i = 0; i < months; i++) {
    const totalM = (startMonth - 1) + i;
    const year = startYear + Math.floor(totalM / 12);
    const month = (totalM % 12) + 1;
    const key = year + '-' + String(month).padStart(2, '0');

    // Apply escalation in the correct month
    const escMonthName = appSettings['escalation_month'] || 'April';
    const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const escM = MONTHS.indexOf(escMonthName) + 1; // 1-based
    // Count how many escalation months have passed
    const yearNum = month === escM && i > 0 ? Math.ceil(i/12) : Math.floor(i / 12);
    const escalatedAmount = base * Math.pow(1 + esc/100, yearNum);
    if (!oppMonths[key]) oppMonths[key] = {};
    oppMonths[key].revenue = Math.round(escalatedAmount);
    // Update input if visible
    const inp = document.getElementById('rev-r-' + key);
    if (inp) inp.value = Math.round(escalatedAmount);
  }
  recalcGrid();
  buildRevGrid(); // rebuild to show all populated values
  showStatus('Grid populated');
}

function formatRev(n) {
  if (!n) return '—';
  return Math.round(n).toLocaleString('en-ZA');
}

async function saveOpportunity() {
  const name = document.getElementById('opp-name').value.trim();
  const orgId = document.getElementById('opp-org-id').value;
  const stageId = document.getElementById('opp-stage-id').value;
  const ownerId = document.getElementById('opp-owner-id').value;

  if (!name) { showStatus('Deal name is required', 'error'); switchOppTab('general', document.querySelector('.opp-tab')); return; }
  if (!orgId) { showStatus('Organisation is required', 'error'); switchOppTab('general', document.querySelector('.opp-tab')); return; }
  if (!stageId) { showStatus('Stage is required', 'error'); switchOppTab('general', document.querySelector('.opp-tab')); return; }
  if (!ownerId) { showStatus('Owner is required', 'error'); switchOppTab('collaborators', document.querySelectorAll('.opp-tab')[2]); return; }

  const payload = {
    name,
    org_id: +orgId || null,
    region_id: +document.getElementById('opp-region-id').value || null,
    stage_id: +stageId || null,
    service_major_id: +document.getElementById('opp-service-major-id').value || null,
    service_sub_id: +document.getElementById('opp-service-sub-id').value || null,
    margin_pct: +document.getElementById('opp-margin-pct').value || 25,
    probability: +document.getElementById('opp-probability').value || 50,
    order_date: document.getElementById('opp-order-date').value || null,
    start_date: document.getElementById('opp-start-date').value || null,
    notes: document.getElementById('opp-notes').value || null,
    ext_notes: document.getElementById('opp-ext-notes').value || null,
    owner_id: +ownerId || null,
    created_by: currentUser?.personId || null,
    lost_date: document.getElementById('opp-lost-date').value || null,
    lost_to: document.getElementById('opp-lost-to').value || null,
    lost_reason: document.getElementById('opp-lost-reason').value || null,
    lost_notes: document.getElementById('opp-lost-notes').value || null,
  };

  try {
    let deal;
    if (oppData.id) {
      const result = await api('deals', 'PATCH', payload, 'id=eq.' + oppData.id + '&select=*');
      deal = result[0];
      showStatus('Opportunity updated');
    } else {
      const result = await api('deals', 'POST', payload, 'select=*');
      deal = result[0];
      showStatus('Opportunity created');
    }
    oppData.id = deal.id;

    // Save revenue stream months
    await saveRevenueStream(deal.id);

    closeOppPage();
    await renderOpportunitiesPage();
  } catch(e) {
    showStatus('Save failed: ' + e.message, 'error');
  }
}

async function saveRevenueStream(dealId) {
  // Get or create opportunity stream
  let streams = await apiGet('revenue_streams', 'deal_id=eq.' + dealId + '&stream_type=eq.opportunity&select=*');
  let streamId;
  if (streams.length) {
    streamId = streams[0].id;
  } else {
    const result = await api('revenue_streams', 'POST', { deal_id: dealId, stream_type: 'opportunity', locked: false }, 'select=*');
    streamId = result[0].id;
  }

  // Save each month that has a value
  const monthEntries = Object.entries(oppMonths).filter(([m, v]) => v.revenue);
  for (const [month, vals] of monthEntries) {
    const existing = await apiGet('revenue_stream_months', `stream_id=eq.${streamId}&month=eq.${month}&select=id`);
    const marginPct = +document.getElementById('opp-margin-pct').value || 25;
    const marginRand = Math.round((vals.revenue * marginPct / 100) * 100) / 100;
    const monthPayload = {
      stream_id: streamId,
      month,
      opportunity_revenue: +vals.revenue,
      opportunity_margin: marginRand,
    };
    if (existing.length) {
      await api('revenue_stream_months', 'PATCH', monthPayload, 'id=eq.' + existing[0].id);
    } else {
      await api('revenue_stream_months', 'POST', monthPayload, '');
    }
  }
}

async function doLogin() {
  const sel = document.getElementById('login-user');
  const userId = sel.value;
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';

  if (!userId) {
    errEl.textContent = 'Please select a user';
    errEl.style.display = 'block';
    return;
  }

  try {
    // Load user and their roles
    const users = await apiGet('system_users', 'id=eq.' + userId + '&select=*');
    const user = users[0];
    if (!user) { errEl.textContent = 'User not found'; errEl.style.display = 'block'; return; }

    // Load person details
    const people = await apiGet('people', 'id=eq.' + user.person_id + '&select=*');
    const person = people[0] || {};

    // Load roles
    const userRoles = await apiGet('user_roles', 'user_id=eq.' + userId + '&select=role_id');
    const roleIds = userRoles.map(r => r.role_id);
    let roles = [];
    if (roleIds.length) {
      roles = await apiGet('roles', 'id=in.(' + roleIds.join(',') + ')&select=*');
    }

    // Load permissions for those roles
    let permissions = [];
    if (roleIds.length) {
      const rp = await apiGet('role_permissions', 'role_id=in.(' + roleIds.join(',') + ')&select=permission_id');
      const permIds = rp.map(r => r.permission_id);
      if (permIds.length) {
        const perms = await apiGet('permissions', 'id=in.(' + permIds.join(',') + ')&select=name');
        permissions = perms.map(p => p.name);
      }
    }

    // Set current user
    currentUser = {
      id: user.id,
      personId: user.person_id,
      name: [person.first_name, person.last_name].filter(Boolean).join(' '),
      roles,
      permissions,
      isAdmin: roles.some(r => r.name === 'Admin')
    };

    // If admin and no permissions set yet, grant all
    if (currentUser.isAdmin && !permissions.length) {
      currentUser.permissions = ['all'];
    }

    // Show app
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-app').style.display = 'flex';
    document.getElementById('sidebar-user-name').textContent = currentUser.name;
    document.getElementById('sidebar-user-role').textContent = roles.map(r => r.name).join(', ') || 'No role';

    await checkConnection();
    await loadAppSettings();
    buildNav();
  } catch(e) {
    errEl.textContent = 'Login failed: ' + e.message;
    errEl.style.display = 'block';
  }
}

function can(permission) {
  if (!currentUser) return false;
  if (currentUser.isAdmin || currentUser.permissions.includes('all')) return true;
  return currentUser.permissions.includes(permission);
}

function doLogout() {
  currentUser = null;
  document.getElementById('main-app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-user').value = '';
}

// ── Role Permissions Manager ──────────────────────────────
async function renderRolePermissions() {
  const body = document.getElementById('table-body');
  const head = document.getElementById('table-head');

  // Use cache if available, fetch in background
  const cachedRoles = allData['roles'];
  const cachedPerms = allData['permissions'];

  if (cachedRoles && cachedPerms) {
    // Render with cached roles/perms immediately, only fetch assignments
    head.innerHTML = '<tr><th style="width:200px;">Permission</th>' +
      cachedRoles.map(r => `<th style="text-align:center;white-space:nowrap;">${r.name}</th>`).join('') + '</tr>';
    body.innerHTML = '<tr class="empty-row"><td colspan="' + (cachedRoles.length+1) + '">Loading assignments...</td></tr>';
  } else {
    head.innerHTML = '';
    body.innerHTML = '<tr class="empty-row"><td colspan="2">Loading...</td></tr>';
  }

  try {
    const [roles, permissions, assignments] = await Promise.all([
      cachedRoles ? Promise.resolve(cachedRoles) : apiGet('roles', 'select=*&order=name.asc'),
      cachedPerms ? Promise.resolve(cachedPerms) : apiGet('permissions', 'select=*&order=name.asc'),
      apiGet('role_permissions', 'select=role_id,permission_id')
    ]);

    // Update cache
    allData['roles'] = roles;
    allData['permissions'] = permissions;

    document.getElementById('page-sub').textContent = roles.length + ' roles, ' + permissions.length + ' permissions';

    // Build assignment set for quick lookup
    const assigned = new Set(assignments.map(a => a.role_id + '_' + a.permission_id));

    // Build table - roles as columns, permissions as rows
    head.innerHTML = '<tr><th style="width:200px;">Permission</th>' +
      roles.map(r => `<th style="text-align:center;white-space:nowrap;">${r.name}</th>`).join('') + '</tr>';

    body.innerHTML = permissions.map(p => {
      const cells = roles.map(r => {
        const checked = assigned.has(r.id + '_' + p.id);
        return `<td style="text-align:center;">
          <input type="checkbox" ${checked ? 'checked' : ''}
            style="width:16px;height:16px;accent-color:var(--red);cursor:pointer;"
            onchange="toggleRolePermission(${r.id}, ${p.id}, this.checked)"
            title="${checked ? 'Remove' : 'Grant'} ${p.name} from ${r.name}">
        </td>`;
      }).join('');
      return `<tr>
        <td><div style="font-weight:600;font-size:13px;">${p.name}</div>
            <div style="font-size:11px;color:var(--text3);">${p.description||''}</div></td>
        ${cells}
      </tr>`;
    }).join('');

  } catch(e) {
    body.innerHTML = `<tr class="empty-row"><td colspan="10">Error: ${e.message}</td></tr>`;
  }
}

async function toggleRolePermission(roleId, permId, grant) {
  try {
    if (grant) {
      await apiPost('role_permissions', { role_id: roleId, permission_id: permId });
    } else {
      await api('role_permissions', 'DELETE', null, 'role_id=eq.' + roleId + '&permission_id=eq.' + permId);
    }
    showStatus(grant ? 'Permission granted' : 'Permission removed');
  } catch(e) {
    showStatus('Failed: ' + e.message, 'error');
    // Revert checkbox
    await renderRolePermissions();
  }
}
